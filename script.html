<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rodízio de Pizza 🍕</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#121212;
    color:white;
    padding:30px;
}

h1{
    text-align:center;
    margin-bottom:10px;
}

.data{
    text-align:center;
    color:#ccc;
    margin-bottom:30px;
}

.confirmado{
    background:#1f1f1f;
    border:2px solid #00cc66;
    padding:15px;
    border-radius:10px;
    text-align:center;
    margin-bottom:30px;
}

.confirmado h2{
    color:#00cc66;
}

.container{
    max-width:700px;
    margin:auto;
}

.pessoa{
    display:flex;
    align-items:center;
    gap:15px;
    background:#1f1f1f;
    padding:12px;
    border-radius:10px;
    margin-bottom:12px;
}

.foto{
    width:70px;
    height:70px;
    border-radius:50%;
    border:2px solid #444;
    object-fit:cover;
}

.nome{
    font-size:18px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

<h1>🍕 Rodízio de Pizza</h1>

<div class="data">
    Sexta-feira • 05/06/2026
</div>

<div class="confirmado">
    <h2>✅ Confirmado</h2>
    <p><strong>Pedro</strong> confirmou presença no rodízio!</p>
</div>

<div class="pessoa">
    <img class="foto" src="https://via.placeholder.com/70" alt="Pedro">
    <div class="nome">Pedro</div>
</div>

<div class="pessoa">
    <img class="foto" src="https://via.placeholder.com/70" alt="Ítalo">
    <div class="nome">Ítalo</div>
</div>

<div class="pessoa">
    <img class="foto" src="https://via.placeholder.com/70" alt="Felipe">
    <div class="nome">Felipe</div>
</div>

<div class="pessoa">
    <img class="foto" src="https://via.placeholder.com/70" alt="Kevin">
    <div class="nome">Kevin</div>
</div>

<div class="pessoa">
    <img class="foto" src="https://via.placeholder.com/70" alt="Madison">
    <div class="nome">Madison</div>
</div>

<div class="pessoa">
    <img class="foto" src="https://via.placeholder.com/70" alt="Clarice">
    <div class="nome">Clarice</div>
</div>

<div class="pessoa">
    <img class="foto" src="https://via.placeholder.com/70" alt="João Pedro">
    <div class="nome">João Pedro</div>
</div>

<div class="pessoa">
    <img class="foto" src="https://via.placeholder.com/70" alt="Murilo">
    <div class="nome">Murilo</div>
</div>

</div>

</body>
</html>
